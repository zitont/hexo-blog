name: Sync Images to CDN

on:
  push:
    branches: [main]
    paths:
      - 'source/images/**'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create images directory
        run: mkdir -p source/images

      - name: List images
        run: |
          echo "Images in source/images/:"
          find source/images -type f -name "*.png" -o -name "*.jpg" -o -name "*.gif" -o -name "*.webp" -o -name "*.svg" 2>/dev/null || echo "No images found"

      - name: Commit if new images
        run: |
          git config user.name "zitont"
          git config user.email "zitont@users.noreply.github.com"
          git add source/images/ -f
          if git diff --staged --quiet; then
            echo "No new images to commit"
          else
            git commit -m "chore: sync images to CDN"
            git push
          fi

      - name: Output CDN URLs
        run: |
          echo "## 图片 CDN 链接格式" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '使用格式: https://cdn.jsdelivr.net/gh/zitont/hexo-blog@main/images/文件名' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "示例:" >> $GITHUB_STEP_SUMMARY
          find source/images -type f | while read f; do
            fname=$(basename "$f")
            echo "- https://cdn.jsdelivr.net/gh/zitont/hexo-blog@main/images/$fname" >> $GITHUB_STEP_SUMMARY
          done
