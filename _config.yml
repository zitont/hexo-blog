# Hexo Configuration
## Docs: https://hexo.io/docs/configuration.html
## Source: https://github.com/hexojs/hexo/

# Site
title: ztt.asia
subtitle: ''
description: '科技与生活的随想'
keywords:
author: zitont
language: zh-CN
timezone: 'Asia/Shanghai'

# URL
## Set your site url here.
url: https://ztt.asia
permalink: :title/
permalink_defaults:
pretty_urls:
  trailing_index: false
  trailing_html: false

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
highlight:
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false
prismjs:
  preprocess: true
  line_number: true
  tab_replace: ''

# Home page setting
index_generator:
  path: ''
  per_page: 10
  order_by: -date

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Metadata elements
meta_generator: true

# Date / Time format
date_format: YYYY-MM-DD
time_format: HH:mm:ss
updated_option: 'mtime'

# Pagination
per_page: 10
pagination_dir: page

# Include / Exclude file(s)
include:
exclude:
ignore:

# Extensions
## Plugins: https://hexo.io/plugins/
## Themes: https://hexo.io/themes/
theme: butterfly

# SEO
sitemap:
  path: sitemap.xml
robotstxt:
  path: robots.txt

# Inject
inject:
  head:
    - <script>document.documentElement.setAttribute('data-theme', 'dark');</script>
    - <meta name="msvalidate.01" content="79E2F8FFF37F1B9DE20B972B2149ABDD" />

# Deployment
## Docs: https://hexo.io/docs/one-command-deployment
deploy:
